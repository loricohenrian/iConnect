# iConnect — Nginx Configuration
# Captive portal + reverse proxy to Gunicorn

upstream iconnect_app {
    # Prefer Unix socket (fastest), fall back to TCP if socket isn't ready.
    server unix:/run/gunicorn/pisowifi.sock fail_timeout=0;
    server 127.0.0.1:8000 backup;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    client_max_body_size 20m;

    # --- Static & Media ---
    location /static/ {
        alias /opt/iconnect/pisowifi/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /opt/iconnect/pisowifi/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # --- Captive portal detection endpoints ---
    # Android
    location /generate_204 {
        return 302 http://$host/;
    }
    # Apple
    location /hotspot-detect.html {
        return 302 http://$host/;
    }
    # Windows
    location /connecttest.txt {
        return 302 http://$host/;
    }
    location /ncsi.txt {
        return 302 http://$host/;
    }
    # Firefox
    location /success.txt {
        return 302 http://$host/;
    }

    # --- Proxy to Django/Gunicorn ---
    location / {
        proxy_pass http://iconnect_app;
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Explicit proxy headers (do not rely on proxy_params include)
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="iConnect — Affordable Internet, Smart Monitoring. School-based coin-operated WiFi system.">
    <title>{% block title %}iConnect{% endblock %}</title>

    <!-- Local icon fallback to avoid external CDN dependency -->
    <link rel="stylesheet" href="{% static 'css/icons-fallback.css' %}">

    <!-- iConnect Base CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
